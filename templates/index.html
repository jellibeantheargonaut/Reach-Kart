<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/signin-page.css') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}">

        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='font-awesome-6.2-web/css/fontawesome.css') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='font-awesome-6.2-web/css/brands.css') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='font-awesome-6.2-web/css/fontawesome.css') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='font-awesome-6.2-web/css/regular.css') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='font-awesome-6.2-web/css/solid.css') }}">
        <script src="{{ url_for('static', filename='js/index.js') }}" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/meilisearch@latest/dist/bundles/meilisearch.umd.js"></script>
    </head>
    <body>
        <div class="top-nav-bar-container">
            <div class="menu-icon-container" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars fa-xl" id="menu-icon"></i>
            </div>
            <div class="logo-container" onclick="window.location.href='/'">
                Reach <i class="fa-solid fa-cart-shopping"></i>
            </div>
            <div class="overlay-container" id="overlay-container"></div>
            <div class="search-bar-container">
                <div class="search-bar-input-container">
                    <input type="text" class="search-bar" id="searchInput" placeholder="books..">
                </div>
                <div class="search-bar-icon-container">
                    <button><i class="fa-solid fa-search"></i></button>
                </div>
                <div id="searchResults" class="search-results-container">
                </div>
            </div>
            <div class="navigation-menu-container">

            </div>
            <div class="user-profile-container">
                <div class="user-profile-icon-container" onclick="toggleSignin()">
                    <i class="fa-solid fa-user fa-xl"></i>
                </div>
                <div class="user-profile-dropdown-container" id="userDropdown">
                    <div class="user-icon-dropdown-item">Profile</div>
                    <div class="user-icon-dropdown-item">Orders</div>
                    <div class="user-icon-dropdown-item">Settings</div>
                    <div class="user-icon-dropdown-divider"></div>
                    <div class="user-icon-dropdown-item">Logout</div>
                </div>
            </div>
        </div>
        <div class="main-content-area">
            <div class="sidebar-menu-container" id="sidebar-menu-container">
            </div>
            <div class="main-content-page-area">
                {% block content %}
                {% endblock %}
            </div>
        </div>
        <div class="signin-overlay-container" id="signin-overlay">
            <div class="signin-form-container">
                <div class="signin-form-title-container">
                    <p>Sign In</p>
                </div>
                <div class="signin-form-inputs-container">
                    <input type="text" id="signin-email" placeholder="Email">
                    <input type="password" id="signin-password" placeholder="Password">
                    
                </div>
                <div class="signin-form-button-container">
                    <button onclick="signIn()">Sign In</button>
                </div>
                <div class="signin-status-container" id="signin-status">
                    <!-- login status here   -->
                </div>
                <div>
                    <p>Don't have an account? <a href="#">Sign Up</a></p>
                </div>
            </div>
        </div>
    </body>
</html>
