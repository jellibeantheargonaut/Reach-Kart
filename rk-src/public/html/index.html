<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="/css/index.css">

        <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/fontawesome.css">
        <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/brands.css">
        <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/fontawesome.css">
        <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/regular.css">
        <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/solid.css">

        <script src="/js/index.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/meilisearch@latest/dist/bundles/meilisearch.umd.js"></script>
    </head>
    <body>
        <div class="top-nav-bar-container">
            <div class="menu-icon-container" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars fa-xl" id="menu-icon"></i>
            </div>
            <div class="logo-container" onclick="window.location.href='/'">
                Reach <i class="fa-solid fa-cart-shopping"></i>
            </div>
            <div class="overlay-container" id="overlay-container"></div>
            <div class="search-bar-container">
                <div class="search-bar-input-container">
                    <input type="text" class="search-bar" id="searchInput" placeholder="books..">
                </div>
                <div class="search-bar-icon-container">
                    <button><i class="fa-solid fa-search"></i></button>
                </div>
                <div id="searchResults" class="search-results-container">
                </div>
            </div>
            <div class="navigation-menu-container">

            </div>
            <div class="user-profile-container">
                <div class="user-profile-icon-container" onclick="toggleUserAccountMenu()">
                    <i class="fa-solid fa-user fa-xl"></i>
                </div>
                <div class="user-profile-dropdown-container" id="userDropdown">
                    <div class="user-icon-dropdown-item">Profile</div>
                    <div class="user-icon-dropdown-item">Orders</div>
                    <div class="user-icon-dropdown-item">Settings</div>
                    <div class="user-icon-dropdown-divider"></div>
                    <div class="user-icon-dropdown-item">Logout</div>
                </div>
            </div>
        </div>
        <div class="main-content-area">
            <div class="sidebar-menu-container" id="sidebar-menu-container">
            </div>
            <div class="main-content-page-area">
            </div>
        </div>
    </body>
</html>
