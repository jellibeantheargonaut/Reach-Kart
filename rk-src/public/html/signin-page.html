<html>
    <head>
        <link rel="stylesheet" type="text/css" href="/css/signin-page.css">

        <script defer src="/js/signin-page.js"></script>
    </head>
    <body>
        <div class="form-container">
            <div class="form-title">
                Sign In
            </div>
            <div class="form-fields">
                <input type="text" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
            </div>
            <div class="form-buttons">
                <button id="signin-button" onclick="signin()">Sign in</button>
            </div>
            <div class="form-messages">
            </div>
            <div class="form-links">
                Don't have an account? <a href="/common/signup">Sign up</a>
            </div>
        </div>
    </body>
</html>
