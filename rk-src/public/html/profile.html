<!-- HTML page for profile of users -->
<!DOCTYPE html>
<head>
    <link rel="stylesheet" type="text/css" href="/css/profile-page.css">

    <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/fontawesome.css">
    <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/brands.css">
    <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/fontawesome.css">
    <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/regular.css">
    <link rel="stylesheet" type="text/css" href="/font-awesome-6.2-web/css/solid.css">

    <script defer src="/js/profile-page.js"></script>
</head>
<body>
    <div class="sidebar-menu">
        <div class="sidebar-menu-header">
            <div class="profile-icon" onclick="window.history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="profile-name">
                John Doe
            </div>
        </div>
        <div class="sidebar-menu-items">
            <div class="sidebar-menu-item">
                Account
            </div>
            <div class="sidebar-menu-item">
                Orders
            </div>
            <div class="sidebar-menu-item" onclick="setWalletDetails()">
                Wallets
            </div>
            <div class="sidebar-menu-item">
                Addresses
            </div>
        </div>
        <div class="sidebar-menu-footer">
            <div class="logout-button">
                Logout
            </div>
        </div>
    </div>
    <div class="mainarea">
        <div class="account-container">
        </div>
        <div class="orders-container">
        </div>
        <div class="wallets-container">
            <div class="wallet-container">
                <div class="wallet-container-header">
                    <div class="wallet-address">
                        <i class="fa-solid fa-wallet"></i>
                    </div>
                </div>
                <div class="wallet-content">
                    <div class="wallet-balance">
                        <i class="fa-brands fa-ethereum"></i> 1000000.00 
                    </div>
                </div>
            </div>
        </div>
        <div class="addresses-container">
        </div>
    </div>
</body>
</html>
